<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Division Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- MapLibre -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>

  <!-- Babylon -->
  <script src="https://unpkg.com/babylonjs@5.42.2/babylon.js"></script>
  <script src="https://unpkg.com/babylonjs-loaders@5.42.2/babylonjs.loaders.min.js"></script>

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    /* ツールバー */
    .toolbar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      background: rgba(255,255,255,0.9);
      padding: 8px 10px;
      border-radius: 6px;
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .toolbar label {
      display: flex;
      flex-direction: column;
      font-size: 11px;
    }

    .toolbar input {
      font-size: 12px;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
      display: none;
      font-size: 12px;
      z-index: 10;
      white-space: pre-line;
    }
  </style>
</head>

<body>
  <!-- ========================= -->
  <!-- CSV 読み込みUI -->
  <!-- ========================= -->
  <div class="toolbar">
    <label>
      Division CSV
      <input
        id="divisionCsvInput"
        type="file"
        accept=".csv"
      />
    </label>

    <label>
      Device CSV
      <input
        id="deviceCsvInput"
        type="file"
        accept=".csv"
      />
    </label>
  </div>

  <!-- ========================= -->
  <!-- Map -->
  <!-- ========================= -->
  <div id="map"></div>

  <!-- ========================= -->
  <!-- Tooltip -->
  <!-- ========================= -->
  <div id="tooltip"></div>

  <!-- ========================= -->
  <!-- Main Script -->
  <!-- ========================= -->
  <script src="./map-app.js"></script>
</body>
</html>
