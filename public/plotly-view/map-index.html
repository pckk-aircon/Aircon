<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Division Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>

  <script src="https://unpkg.com/babylonjs@5.42.2/babylon.js"></script>
  <script src="https://unpkg.com/babylonjs-loaders@5.42.2/babylonjs.loaders.min.js"></script>

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    #tooltip {
      position: absolute;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
      display: none;
      font-size: 12px;
      z-index: 10;
      white-space: pre-line;
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <input id="divisionCsvInput" type="file" accept=".csv" />
  </div>

  <div id="map"></div>
  <div id="tooltip"></div>

  <script src="./map-app.js"></script>
</body>
</html>
